<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>User Management</title>

<style>

body{
font-family:'Segoe UI',Tahoma;
background:#f4f6f9;
padding:20px;
text-align:center;
}

.box{
background:white;
padding:20px;
max-width:950px;
margin:auto;
border-radius:8px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h2{
margin-bottom:10px;
}

/* SEARCH BAR */

.searchBar{
width:100%;
padding:10px;
margin-bottom:15px;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

/* BUTTONS */

button{
padding:7px 12px;
margin:3px;
border:none;
color:white;
border-radius:4px;
cursor:pointer;
font-size:13px;
}

.delete{background:#dc3545;}
.reset{background:#ff9800;}

/* 🔵 REGISTER BUTTON */
.register{
background:#007bff;
margin-bottom:15px;
text-decoration:none;
display:inline-block;
padding:10px 18px;
color:white;
border-radius:5px;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #eee;
padding:10px;
text-align:left;
}

th{
background:#f8f9fa;
}

/* MOBILE */

@media(max-width:600px){

table,thead,tbody,th,td,tr{
display:block;
}

thead{
display:none;
}

tr{
background:white;
margin-bottom:15px;
padding:10px;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

td{
border:none;
padding:8px;
}

td:before{
font-weight:bold;
display:block;
color:#555;
}

td:nth-child(1):before{content:"ID";}
td:nth-child(2):before{content:"Name";}
td:nth-child(3):before{content:"Role";}
td:nth-child(4):before{content:"Action";}

}

</style>

</head>

<body>

<div class="box">

<h2>Users Management</h2>

<a href="register.html" class="register">Register New User</a>

<input type="text" id="searchInput" class="searchBar" placeholder="Search user by name or ID">

<table>

<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Role</th>
<th>Action</th>
</tr>
</thead>

<tbody id="userTableBody"></tbody>

</table>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

/* 🔥 FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyBAnvpgtFnBRXYApmnnb4yoYQqHqcgnhsk",
  authDomain: "clinical-570e7.firebaseapp.com",
  projectId: "clinical-570e7",
  storageBucket: "clinical-570e7.appspot.com",
  messagingSenderId: "521811871855",
  appId: "1:521811871855:web:02ec35c3fd299db6e2659a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* 🔐 ADMIN CHECK */
let user = JSON.parse(localStorage.getItem("user"));

if (!user || user.role !== "admin") {
  alert("Access Denied ❌");
  window.location.href = "dashboard.html";
}

/* GLOBAL DATA */
let allUsers = [];
const tableBody = document.getElementById("userTableBody");
const searchInput = document.getElementById("searchInput");

/* 📥 LOAD USERS */
async function loadUsers() {
  try {
    const snapshot = await getDocs(collection(db, "users"));

    allUsers = [];

    snapshot.forEach(docSnap => {
      let data = docSnap.data();
      data.docId = docSnap.id; // ✅ ALWAYS EXISTS
      allUsers.push(data);
    });

    displayUsers(allUsers);

  } catch (err) {
    console.error(err);
    alert("Error loading users ❌");
  }
}

/* 📊 DISPLAY USERS */
function displayUsers(users) {

  tableBody.innerHTML = "";

  if (users.length === 0) {
    tableBody.innerHTML = "<tr><td colspan='4'>No users found</td></tr>";
    return;
  }

  users.forEach((u, index) => {

    let id = u.docId; // ✅ FIXED (NO MORE N/A)
    let name = u.fullname || u.name || "N/A";
    let role = u.role || "N/A";
    let username = u.username || "";

    let row = `
      <tr>
        <td>${id}</td>
        <td>${name}</td>
        <td><b>${role}</b></td>
        <td>
          <button class="reset" onclick="resetPassword('${u.docId}','${role}','${username}')">Reset</button>
          <button class="delete" onclick="deleteUser('${u.docId}','${name}')">Delete</button>
        </td>
      </tr>
    `;

    tableBody.innerHTML += row;

  });
}

/* 🔍 SEARCH */
searchInput.addEventListener("keyup", () => {

  let value = searchInput.value.toLowerCase();

  let filtered = allUsers.filter(u => {
    let name = (u.fullname || u.name || "").toLowerCase();
    return name.includes(value) || u.docId.includes(value);
  });

  displayUsers(filtered);
});

/* 🗑 DELETE USER */
window.deleteUser = async function (id, name) {

  if (!confirm("Delete " + name + " ?")) return;

  try {
    await deleteDoc(doc(db, "users", id));
    alert("User deleted ✅");
    loadUsers();
  } catch (err) {
    console.error(err);
    alert("Delete failed ❌");
  }
};

/* 🔑 RESET PASSWORD */
window.resetPassword = async function (id, role, username) {

  let newPass = role === "admin" ? "7890" : "1234";

  if (!confirm("Reset password for " + username + " ?")) return;

  try {
    await updateDoc(doc(db, "users", id), {
      password: newPass
    });

    alert("Password reset to " + newPass + " ✅");

  } catch (err) {
    console.error(err);
    alert("Reset failed ❌");
  }
};

/* 🚀 START */
loadUsers();

</script>
</body>
</html>
