<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HDAMC | Staff Directory & Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; color: #1e293b; }
        .glass-header { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid #e2e8f0; }
        .card { background: white; border-radius: 16px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        
        th { background: #f1f5f9; color: #64748b; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
        tr:hover td { background-color: #f8fafc; }
        
        .role-badge { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .role-admin { background: #fee2e2; color: #b91c1c; }
        .role-medical { background: #dbeafe; color: #1d4ed8; }
        .role-dental { background: #f0fdf4; color: #15803d; }
        
        .btn-action { transition: all 0.2s; }
        .btn-action:hover { transform: translateY(-1px); }
    </style>
</head>
<body class="min-h-screen">

<header class="glass-header sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 h-20 flex items-center justify-between">
        <div>
            <h1 class="text-xl font-bold text-slate-800">Staff Management</h1>
            <p class="text-[10px] text-blue-600 font-bold uppercase tracking-widest">Administrative Control</p>
        </div>
        <div class="flex gap-3">
            <a href="register.html" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-xl text-sm font-bold transition-all flex items-center gap-2 shadow-lg shadow-blue-100">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" />
                </svg>
                Add Members
            </a>
            <a href="dashboard.html" class="bg-white border border-slate-200 text-slate-600 px-4 py-2 rounded-xl text-sm font-bold hover:bg-slate-50 transition-all">
                Dashboard
            </a>
        </div>
    </div>
</header>

<main class="max-w-6xl mx-auto p-6">
    <div class="mb-6 relative">
        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
            <svg class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
        </div>
        <input type="text" id="searchInput" class="w-full pl-11 pr-4 py-4 card border-none focus:ring-2 focus:ring-blue-500 text-sm outline-none" placeholder="Search practitioners by name or Employee ID...">
    </div>

    <div class="card overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr>
                        <th class="px-6 py-4">Employee ID</th>
                        <th class="px-6 py-4">Full Name</th>
                        <th class="px-6 py-4 text-center">Department</th>
                        <th class="px-6 py-4 text-right">System Actions</th>
                    </tr>
                </thead>
                <tbody id="userTableBody" class="divide-y divide-slate-100">
                    </tbody>
            </table>
        </div>
    </div>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot, deleteDoc, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {  
  apiKey: "AIzaSyBAnvpgtFnBRXYApmnnb4yoYQqHqcgnhsk",  
  authDomain: "clinical-570e7.firebaseapp.com",  
  projectId: "clinical-570e7",  
  storageBucket: "clinical-570e7.firebasestorage.app",  
  messagingSenderId: "521811871855",  
  appId: "1:521811871855:web:02ec35c3fd299db6e2659a",  
  measurementId: "G-DBRPR7MXT4"  
};  

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* 🔐 SECURE AUTH GUARD & SESSION CHECK */
const authData = JSON.parse(localStorage.getItem("hdamc_auth"));

async function validateAdminSession() {
    if (!authData || authData.role !== "admin") {
        alert("Access Denied: Admin privileges required.");
        window.location.href = "dashboard.html";
        return;
    }

    const snap = await getDoc(doc(db, "users", authData.empId));
    if (snap.exists() && snap.data().activeSession !== authData.sessionToken) {
        alert("Session Expired: Logged in on another device.");
        localStorage.clear();
        window.location.href = "index.html";
    }
}
window.addEventListener('focus', validateAdminSession);
validateAdminSession();

let allUsers = [];
const tableBody = document.getElementById("userTableBody");
const searchInput = document.getElementById("searchInput");

/* 📥 REAL-TIME SYNC */
onSnapshot(collection(db, "users"), (snapshot) => {
    allUsers = [];
    snapshot.forEach(docSnap => {
        let data = docSnap.data();
        data.docId = docSnap.id;
        allUsers.push(data);
    });
    renderUsers(allUsers);
});

/* 📊 RENDER TABLE */
function renderUsers(users) {
    tableBody.innerHTML = "";
    if (users.length === 0) {
        tableBody.innerHTML = `<tr><td colspan="4" class="px-6 py-10 text-center text-slate-400 italic">No matching records found.</td></tr>`;
        return;
    }

    users.forEach(u => {
        const tr = document.createElement("tr");
        const roleClass = `role-${u.role || 'medical'}`;
        const displayName = u.fullname || u.name || "Unknown Staff";
        
        tr.innerHTML = `
            <td class="px-6 py-4 font-mono text-xs text-slate-500 font-bold">${u.docId}</td>
            <td class="px-6 py-4">
                <div class="font-bold text-slate-800">${displayName}</div>
                <div class="text-[10px] text-slate-400 uppercase tracking-tighter">System Practitioner</div>
            </td>
            <td class="px-6 py-4 text-center">
                <span class="role-badge ${roleClass}">${u.role}</span>
            </td>
            <td class="px-6 py-4 text-right">
                <div class="flex justify-end gap-2">
                    <button onclick="resetPass('${u.docId}', '${displayName}')" class="btn-action bg-slate-100 text-slate-600 px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-blue-50 hover:text-blue-600">
                        Reset (1234)
                    </button>
                    <button onclick="deleteUser('${u.docId}', '${displayName}')" class="btn-action bg-red-50 text-red-600 p-2 rounded-lg hover:bg-red-600 hover:text-white">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                    </button>
                </div>
            </td>
        `;
        tableBody.appendChild(tr);
    });
}

/* 🔍 SEARCH HANDLER */
searchInput.addEventListener("input", (e) => {
    const term = e.target.value.toLowerCase();
    const filtered = allUsers.filter(u => {
        const name = (u.fullname || u.name || "").toLowerCase();
        return name.includes(term) || u.docId.toLowerCase().includes(term);
    });
    renderUsers(filtered);
});

/* 🗑 DELETE ACTION (Admins can delete other Admins) */
window.deleteUser = async (id, name) => {
    // Only block if trying to delete yourself
    if (id === authData.empId) {
        return alert("Self-Deletion Blocked: You cannot delete your own active admin account.");
    }

    if (!confirm(`CRITICAL: Are you sure you want to remove ${name} from the system? This action cannot be undone.`)) return;

    try {
        await deleteDoc(doc(db, "users", id));
        alert(`${name} removed from registry ✅`);
    } catch (err) { 
        alert("Action failed. Ensure you have proper permissions."); 
    }
};

/* 🔑 RESET ACTION (Standard 1234) */
window.resetPass = async (id, name) => {
    if (!confirm(`Reset password for ${name} to default (1234)?`)) return;

    try {
        await updateDoc(doc(db, "users", id), { password: "1234" });
        alert(`Access reset for ${name}. Temporary password: 1234 ✅`);
    } catch (err) { 
        alert("Reset failed."); 
    }
};

</script>
</body>
</html>
