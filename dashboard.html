<!DOCTYPE html>

<html>  
<head>  
<title>Clinic Dashboard</title>  <meta name="viewport" content="width=device-width, initial-scale=1.0">  <style>  
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter;}  
body{background:linear-gradient(135deg,#0f172a,#1e293b);}  
  
.container{max-width:1100px;margin:auto;padding:15px;}  
  
.card{  
  background:#fff;  
  border-radius:14px;  
  padding:15px;  
  margin-bottom:15px;  
  box-shadow:0 10px 25px rgba(0,0,0,0.15);  
}  
  
.header{  
  display:flex;  
  justify-content:space-between;  
  flex-wrap:wrap;  
  gap:10px;  
}  
  
.title{font-size:20px;font-weight:600;}  
.user{font-size:13px;color:#64748b;}  
  
.actions{display:flex;gap:8px;flex-wrap:wrap;}  
  
button{  
  padding:7px 12px;  
  border:none;  
  border-radius:8px;  
  color:white;  
  cursor:pointer;  
  font-size:13px;  
}  
  
.app{background:#3b82f6;}  
.pass{background:#22c55e;}  
.logout{background:#ef4444;}  
#usersBtn{background:#8b5cf6;}  
  
.stats{  
  display:grid;  
  grid-template-columns:repeat(auto-fit,minmax(130px,1fr));  
  gap:10px;  
}  
  
.stat{  
  background:#f8fafc;  
  padding:12px;  
  border-radius:10px;  
  text-align:center;  
}  
  
.stat h3{font-size:12px;color:#64748b;}  
.stat p{font-size:20px;font-weight:700;}  
  
.section-title{  
  margin:10px 0;  
  font-weight:600;  
  color:#0f172a;  
}  
  
.announce-box{  
  background:#f1f5f9;  
  padding:10px;  
  border-radius:10px;  
  margin-top:8px;  
}  
  
input{  
  padding:6px;  
  border-radius:6px;  
  border:1px solid #ccc;  
  font-size:13px;  
}  
  
.file{  
  width:110px;  
}  
  
@media(max-width:600px){  
  .title{font-size:18px;}  
}  
</style>  </head>  <body>  <div class="container">  <!-- HEADER -->  <div class="card">  
  <div class="header">  
    <div>  
      <div class="title">Dashboard</div>  
      <div class="user" id="userInfo"></div>  
    </div>  <div class="actions">  
  <button class="app" onclick="goApp()">Appointments</button>  
  <button class="pass" onclick="goPass()">Password</button>  
  <button class="logout" onclick="logout()">Logout</button>  
  <button id="usersBtn" onclick="goUsers()">users</button>  
</div>

  </div>  
</div>  <!-- STATS -->  <div class="card">  
  <div id="statsContainer"></div>  
</div>  <!-- CONTROL -->  <div class="card" id="controlBox"></div>  <!-- ANNOUNCEMENTS -->  <div class="card">  
  <h3>Announcements</h3>  
  <div id="adminBox"></div>  
  <div id="list"></div>  
</div>  </div>  <script type="module">  
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";  
import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";  
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";  
  
const firebaseConfig = {  
  apiKey: "AIzaSyBAnvpgtFnBRXYApmnnb4yoYQqHqcgnhsk",  
  authDomain: "clinical-570e7.firebaseapp.com",  
  projectId: "clinical-570e7",  
  storageBucket: "clinical-570e7.firebasestorage.app",  
  messagingSenderId: "521811871855",  
  appId: "1:521811871855:web:02ec35c3fd299db6e2659a",  
  measurementId: "G-DBRPR7MXT4"  
};  
  
const app = initializeApp(firebaseConfig);  
const db = getFirestore(app);  
const storage = getStorage(app);  
  
const user = JSON.parse(localStorage.getItem("user"));  
if(!user) location.href="index.html";  
  
// 👇 HIDE USERS BUTTON FOR NON-ADMIN  
if(user.role !== "admin"){  
  document.getElementById("usersBtn").style.display = "none";  
}  
  
// USER INFO  
document.getElementById("userInfo").innerHTML =  
  `<b>${user.name}</b> • ${user.role.toUpperCase()}`;  
  
// NAVIGATION  
window.goApp = () => location.href="app.html";  
window.goPass = () => location.href="changepass.html";  
window.logout = () => {localStorage.clear();location.href="index.html"};  
  
// 🔐 ADMIN ONLY ACCESS  
window.goUsers = () => {  
  let user = JSON.parse(localStorage.getItem("user"));  
  
  if(!user || user.role !== "admin"){  
    alert("Access Denied ❌");  
    return;  
  }  
  
  location.href="use.html";  
};  
  
// 📊 STATS  
const statsContainer=document.getElementById("statsContainer");  
  
onSnapshot(collection(db,"appointments"),snap=>{  
  let dTotal=0,dDone=0,dPend=0;  
  let mTotal=0,mDone=0,mPend=0;  
  
  const now=new Date();  
  
  snap.forEach(docSnap=>{  
    const d=docSnap.data();  
    if(!d.date) return;  
  
    const dt=new Date(d.date);  
    if(isNaN(dt)) return;  
  
    if(dt.toDateString()!==now.toDateString()) return;  
  
    const service=(d.service||"").toLowerCase();  
    const status=(d.status||"pending");  
  
    if(service.includes("dental")){  
      dTotal++;  
      status==="completed"?dDone++:dPend++;  
    }  
  
    if(service.includes("medical")||service.includes("health")){  
      mTotal++;  
      status==="completed"?mDone++:mPend++;  
    }  
  });  
  
  statsContainer.innerHTML="";  
  
  if(user.role==="admin"){  
    statsContainer.innerHTML+=section("Dental",dTotal,dDone,dPend);  
    statsContainer.innerHTML+=section("Medical",mTotal,mDone,mPend);  
  }  
  
  if(user.role==="dental"){  
    statsContainer.innerHTML+=section("Dental",dTotal,dDone,dPend);  
  }  
  
  if(user.role==="medical"){  
    statsContainer.innerHTML+=section("Medical",mTotal,mDone,mPend);  
  }  
  
});  
  
function section(name,total,done,pend){  
  return `  
  <div class="section-title">${name}</div>  
  <div class="stats">  
    <div class="stat"><h3>Total</h3><p>${total}</p></div>  
    <div class="stat"><h3>Completed</h3><p>${done}</p></div>  
    <div class="stat"><h3>Pending</h3><p>${pend}</p></div>  
  </div>`;  
}  
  
// 🛑 CONTROL PANEL  
const controlBox=document.getElementById("controlBox");  
  
if(user.role==="admin"){  
  controlBox.innerHTML=`  
    <h3>Control Panel</h3>  
    <button onclick="toggle('dental')">Toggle Dental Booking</button>  
    <button onclick="toggle('medical')">Toggle Medical Booking</button>  
  `;  
}  
  
window.toggle=async(type)=>{  
  const refDoc=doc(db,"settings","booking");  
  const snap=await getDoc(refDoc);  
  
  let data=snap.exists()?snap.data():{};  
  data[type]=!data[type];  
  
  await setDoc(refDoc,data);  
  alert(type+" booking toggled");  
};  
  
// 📢 ANNOUNCEMENTS  
const adminBox=document.getElementById("adminBox");  
const list=document.getElementById("list");  
  
if(user.role==="admin"){  
  adminBox.innerHTML=`  
    <div style="display:flex;gap:6px;flex-wrap:wrap;">  
      <input id="msg" placeholder="Write..." style="flex:1;">  
      <input type="file" id="file" class="file">  
      <button onclick="post()" style="background:#3b82f6;">Post</button>  
    </div>`;  
}  
  
window.post=async()=>{  
  const msg=document.getElementById("msg").value;  
  const file=document.getElementById("file").files[0];  
  
  let url="";  
  if(file){  
    const r=ref(storage,"files/"+Date.now()+file.name);  
    await uploadBytes(r,file);  
    url=await getDownloadURL(r);  
  }  
  
  await addDoc(collection(db,"announcements"),{  
    message:msg,file:url,createdAt:Date.now()  
  });  
  
  document.getElementById("msg").value="";  
};  
  
onSnapshot(collection(db,"announcements"),snap=>{  
  list.innerHTML="";  
  let arr=[];  
  snap.forEach(d=>arr.push({id:d.id,...d.data()}));  
  arr.sort((a,b)=>b.createdAt-a.createdAt);  
  
  arr.forEach(d=>{  
    const box=document.createElement("div");  
    box.className="announce-box";  
  
    box.innerHTML=`  
      ${d.message||""}<br>  
      ${d.file?`<a href="${d.file}" target="_blank">📎 File</a>`:""}  
      ${user.role==="admin"?`<button style="background:red;">Delete</button>`:""}  
    `;  
  
    if(user.role==="admin"){  
      box.querySelector("button").onclick=()=>deleteDoc(doc(db,"announcements",d.id));  
    }  
  
    list.appendChild(box);  
  });  
});  
</script>  </body>  
</html>
