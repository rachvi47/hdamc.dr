  <!DOCTYPE html>  <html lang="en">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>HDAMC | Clinical Management Dashboard</title>  
    <script src="https://cdn.tailwindcss.com"></script>  
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">  
    <style>  
        body {  
            font-family: 'Inter', sans-serif;  
            background: #f8fafc;  
            color: #1e293b;  
        }  .glass-header {  
        background: rgba(255, 255, 255, 0.8);  
        backdrop-filter: blur(12px);  
        border-bottom: 1px solid #e2e8f0;  
        position: sticky;  
        top: 0;  
        z-index: 100;  
    }  

    .card {  
        background: white;  
        border-radius: 16px;  
        border: 1px solid #e2e8f0;  
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);  
        transition: transform 0.2s ease;  
    }  

    .stat-card {  
        background: linear-gradient(135deg, #ffffff 0%, #f1f5f9 100%);  
        border-left: 4px solid #3b82f6;  
    }  

    .btn-action {  
        transition: all 0.2s ease;  
        display: inline-flex;  
        align-items: center;  
        justify-content: center;  
        gap: 8px;  
    }  

    .btn-action:hover {  
        transform: translateY(-1px);  
        filter: brightness(1.05);  
    }  

    /* Custom Scrollbar */  
    ::-webkit-scrollbar { width: 6px; }  
    ::-webkit-scrollbar-track { background: #f1f5f9; }  
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }  
</style>

</head>  
<body>  <header class="glass-header mb-6">  
    <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">  
        <div>  
            <h1 class="text-xl font-bold text-blue-600">HDAMC Portal</h1>  
            <p id="userInfo" class="text-xs text-slate-500 font-medium uppercase tracking-wider"></p>  
        </div>  <div class="flex items-center gap-3">  
        <button onclick="goApp()" class="btn-action bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-semibold">  
            Appointments  
        </button>  
        <button id="usersBtn" onclick="goUsers()" class="btn-action bg-purple-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hidden">  
            Staff Registry  
        </button> 
<button onclick="goRecords()" class="btn-action bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-semibold">
    Records
</button>           
        <div class="h-8 w-px bg-slate-200 mx-2"></div>  
        <button onclick="logout()" class="text-slate-400 hover:text-red-500 transition-colors">  
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">  
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />  
            </svg>  
        </button>  
    </div>  
</div>

</header>  <main class="max-w-7xl mx-auto px-4 pb-12">  <div class="mb-8">  
    <h2 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4">Daily Clinical Overview</h2>  
    <div id="statsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-6">  
        </div>  
</div>  

<div class="grid grid-cols-1 lg:grid-cols-3 gap-8">  
      
    <div class="lg:col-span-2 space-y-6">  
        <div class="card p-6">  
            <div class="flex items-center justify-between mb-6">  
                <h3 class="font-bold text-slate-800 text-lg">Internal Announcements</h3>  
                <span class="bg-blue-100 text-blue-600 text-xs font-bold px-2 py-1 rounded">Live Updates</span>  
            </div>  
              
            <div id="adminPostBox" class="mb-8 hidden">  
                <div class="bg-slate-50 p-4 rounded-xl border border-dashed border-slate-300">  
                    <textarea id="msg" rows="2" class="w-full bg-transparent border-none focus:ring-0 text-sm" placeholder="Broadcast a medical update..."></textarea>  
                    <div class="flex items-center justify-between mt-3 pt-3 border-t border-slate-200">  
                        <input type="file" id="file" class="text-xs text-slate-500 file:mr-4 file:py-1 file:px-2 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">  
                        <button onclick="post()" class="bg-blue-600 text-white px-6 py-1.5 rounded-lg text-sm font-bold shadow-lg shadow-blue-200">Post</button>  
                    </div>  
                </div>  
            </div>  

            <div id="announcementList" class="space-y-4">  
                </div>  
        </div>  
    </div>  

    <div class="space-y-6">  
        <div id="controlPanel" class="card p-6 bg-slate-900 text-white hidden">  
            <h3 class="font-bold mb-4 flex items-center gap-2">  
                <svg class="h-5 w-5 text-blue-400" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"></path></svg>  
                Clinic Controls  
            </h3>  
            <div class="space-y-3">  
                <button onclick="toggle('dental')" class="w-full py-2 px-4 rounded-lg bg-white/10 hover:bg-white/20 text-sm font-medium border border-white/10 text-left flex justify-between items-center">  
                    Toggle Dental Booking <span class="text-[10px] bg-blue-500 px-2 py-0.5 rounded uppercase">Admin</span>  
                </button>  
                <button onclick="toggle('medical')" class="w-full py-2 px-4 rounded-lg bg-white/10 hover:bg-white/20 text-sm font-medium border border-white/10 text-left flex justify-between items-center">  
                    Toggle Medical Booking <span class="text-[10px] bg-blue-500 px-2 py-0.5 rounded uppercase">Admin</span>  
                </button>  
            </div>  
        </div>  

        <div class="card p-6 border-l-4 border-l-green-500">  
            <h3 class="font-bold text-slate-800 mb-2">System Security</h3>  
            <p class="text-xs text-slate-500 mb-4">Your session is encrypted and tied to this device.</p>  
            <button onclick="goPass()" class="w-full py-2 border border-slate-200 rounded-lg text-sm font-semibold hover:bg-slate-50">  
                Change Access Password  
            </button>  
        </div>  
    </div>  
</div>

</main>  <script type="module">  
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";  
    import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";  
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";  
  
    const firebaseConfig = {    
  apiKey: "AIzaSyBAnvpgtFnBRXYApmnnb4yoYQqHqcgnhsk",    
  authDomain: "clinical-570e7.firebaseapp.com",    
  projectId: "clinical-570e7",    
  storageBucket: "clinical-570e7.firebasestorage.app",    
  messagingSenderId: "521811871855",    
  appId: "1:521811871855:web:02ec35c3fd299db6e2659a",    
  measurementId: "G-DBRPR7MXT4"    
};    
    const app = initializeApp(firebaseConfig);  
    const db = getFirestore(app);  
    const storage = getStorage(app);  
  
    // 🔐 AUTH & SESSION VALIDATION  
    const user = JSON.parse(localStorage.getItem("hdamc_auth"));  
    if(!user) window.location.href="login.html";  
  
    async function validateSession() {  
        try {  
            const userRef = doc(db, "users", user.empId);  
            const snap = await getDoc(userRef);  
              
            if (snap.exists() && snap.data().activeSession !== user.sessionToken) {  
                alert("🔴 SESSION EXPIRED: You have logged in from another device.");  
                localStorage.clear();  
                window.location.href = "login.html";  
            }  
        } catch(e) { console.error("Session check failed", e); }  
    }  
  
    // Run session check on focus  
    window.addEventListener('focus', validateSession);  
    validateSession(); // Initial check  
  
    // UI Initialization  
    document.getElementById("userInfo").innerHTML = `<b>${user.name}</b> <span class="mx-2 text-slate-300">|</span> ${user.role}`;  
      
    if(user.role === "admin") {  
        document.getElementById("usersBtn").classList.remove('hidden');  
        document.getElementById("adminPostBox").classList.remove('hidden');  
        document.getElementById("controlPanel").classList.remove('hidden');  
    }  
  
    // 📊 REAL-TIME CLINICAL STATS  
    const statsGrid = document.getElementById("statsGrid");  
    onSnapshot(collection(db, "appointments"), (snap) => {  
        let stats = {  
            dental: { total: 0, done: 0 },  
            medical: { total: 0, done: 0 }  
        };  
        const today = new Date().toDateString();  
  
        snap.forEach(docSnap => {  
            const d = docSnap.data();  
            if(new Date(d.date).toDateString() === today) {  
                const service = (d.service || "").toLowerCase();  
                const key = service.includes("dental") ? 'dental' : 'medical';  
                stats[key].total++;  
                if(d.status === "completed") stats[key].done++;  
            }  
        });  
  
        statsGrid.innerHTML = "";  
        if(user.role === "admin" || user.role === "dental") renderStat("Dental Clinic", stats.dental);  
        if(user.role === "admin" || user.role === "medical") renderStat("Medical Clinic", stats.medical);  
    });  
  
    function renderStat(label, data) {  
        const pend = data.total - data.done;  
        statsGrid.innerHTML += `  
            <div class="card p-5 stat-card">  
                <h4 class="text-xs font-bold text-slate-500 uppercase">${label}</h4>  
                <div class="flex justify-between items-end mt-4">  
                    <div><p class="text-3xl font-bold text-slate-800">${data.total}</p><p class="text-[10px] text-slate-400">TODAY'S TOTAL</p></div>  
                    <div class="text-right">  
                        <span class="text-green-600 font-bold text-sm">${data.done} Done</span><br>  
                        <span class="text-orange-500 font-bold text-sm">${pend} Waiting</span>  
                    </div>  
                </div>  
            </div>`;  
    }  
  
    // 📢 ANNOUNCEMENT SYSTEM  
    const list = document.getElementById("announcementList");  
    onSnapshot(collection(db, "announcements"), (snap) => {  
        let arr = [];  
        snap.forEach(d => arr.push({ id: d.id, ...d.data() }));  
        arr.sort((a, b) => b.createdAt - a.createdAt);  
          
        list.innerHTML = "";  
        arr.forEach(d => {  
            const el = document.createElement("div");  
            el.className = "p-4 bg-slate-50 rounded-xl border border-slate-100 flex justify-between items-start";  
            el.innerHTML = `  
                <div>  
                    <p class="text-sm text-slate-700">${d.message}</p>  
                    ${d.file ? `<a href="${d.file}" target="_blank" class="text-blue-600 text-xs mt-2 inline-flex items-center gap-1 font-bold">📎 View Attachment</a>` : ""}  
                    <p class="text-[10px] text-slate-400 mt-2 uppercase">${new Date(d.createdAt).toLocaleTimeString()}</p>  
                </div>  
                ${user.role === 'admin' ? `<button class="text-slate-300 hover:text-red-500 delete-btn">✕</button>` : ""}  
            `;  
            if(user.role === 'admin') el.querySelector('.delete-btn').onclick = () => deleteDoc(doc(db, "announcements", d.id));  
            list.appendChild(el);  
        });  
    });  
  
    // Navigation Helper  
    window.goApp = () => window.location.href="app.html";  
    window.goPass = () => window.location.href="changepass.html";  
    window.goUsers = () => window.location.href="use.html";  
    window.logout = () => { localStorage.clear(); window.location.href="index.html"; };  
    window.goRecords = () => window.location.href = "record.html";
  
    // Post/Toggle Functions as per your logic...  
    window.post = async () => { /* Upload logic same as your code */ };  
    window.toggle = async (type) => { /* Toggle logic same as your code */ };  
  
</script>  </body>  
</html>
