<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Change Password - V-Tohnna IAM</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
text-align:center;
padding-top:100px;
}

.box{
background:white;
padding:30px;
width:90%;
max-width:320px;
margin:auto;
border-radius:8px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

input{
width:100%;
padding:8px;
margin:10px 0;
border:1px solid #ccc;
border-radius:4px;
}

button{
padding:8px 15px;
background:#007BFF;
border:none;
color:white;
border-radius:4px;
cursor:pointer;
width:100%;
}

#msg{
margin-top:10px;
font-size:14px;
color:#333;
}

</style>

</head>

<body>

<div class="box">

<h2>Change Password</h2>

<input id="oldpass" type="password" placeholder="Old Password">

<input id="newpass" type="password" placeholder="New Password">

<input id="confirmpass" type="password" placeholder="Confirm New Password">

<button onclick="changePassword()">Update Password</button>

<p id="msg"></p>

<br>

<a href="dashboard.html">Back to Dashboard</a>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBAnvpgtFnBRXYApmnnb4yoYQqHqcgnhsk",
  authDomain: "clinical-570e7.firebaseapp.com",
  projectId: "clinical-570e7",
  storageBucket: "clinical-570e7.firebasestorage.app",
  messagingSenderId: "521811871855",
  appId: "1:521811871855:web:02ec35c3fd299db6e2659a",
  measurementId: "G-DBRPR7MXT4"
};

const app = initializeApp(firebaseConfig)
const db = getFirestore(app)

window.changePassword = async function(){

let oldpass = document.getElementById("oldpass").value
let newpass = document.getElementById("newpass").value
let confirmpass = document.getElementById("confirmpass").value
let msg=document.getElementById("msg")

let user = JSON.parse(localStorage.getItem("user"))

if(!user){
  msg.innerText="User not logged in"
  return
}

let username = user.username

if(newpass!==confirmpass){
  msg.innerText="Passwords do not match"
  return
}

const snapshot = await getDocs(collection(db,"users"))

let userDoc=null
let userData=null

snapshot.forEach(docSnap=>{
  let data=docSnap.data()
  if(data.username===username){
    userDoc=docSnap.id
    userData=data
  }
})

if(!userData){
  msg.innerText="User not found"
  return
}

if(userData.password!==oldpass){
  msg.innerText="Old password incorrect"
  return
}

await updateDoc(doc(db,"users",userDoc),{
  password:newpass
})

msg.innerText="Password updated successfully ✅"

document.getElementById("oldpass").value=""
document.getElementById("newpass").value=""
document.getElementById("confirmpass").value=""
}
</script>

</body>

</html>
