<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HDAMC | Professional Clinical Queue</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; color: #1e293b; }
        .glass-card { background: white; border: 1px solid #e2e8f0; transition: all 0.2s; }
        .glass-card:hover { border-color: #3b82f6; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .status-badge { padding: 4px 12px; border-radius: 99px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="antialiased">

    <header class="sticky top-0 z-10 bg-white/90 backdrop-blur-md border-b border-slate-200">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold text-slate-900 tracking-tight">Clinical Management</h1>
                <p class="text-[10px] text-blue-600 uppercase font-bold tracking-widest" id="userDisplay">Loading Profile...</p>
            </div>
            <button onclick="location.href='dashboard.html'" class="bg-slate-100 text-slate-700 px-4 py-2 rounded-lg text-sm font-semibold hover:bg-slate-200 transition-all">
                ← Dashboard
            </button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 md:p-6">
        <div class="mb-8">
            <h2 id="queueCounter" class="text-3xl font-extrabold text-slate-800">...</h2>
            <p class="text-slate-500">Real-time patient flow and clinical transfers</p>
        </div>

        <div id="list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="h-48 bg-slate-200 animate-pulse rounded-2xl"></div>
            <div class="h-48 bg-slate-200 animate-pulse rounded-2xl"></div>
        </div>
    </main>

    <div id="modal" class="fixed inset-0 bg-slate-900/60 hidden backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden animate-fade-in">
            <div class="p-6 border-b border-slate-100 bg-slate-50/50">
                <div class="flex justify-between items-center">
                    <h2 class="text-xl font-bold text-slate-800">Clinical Action Suite</h2>
                    <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 text-2xl leading-none">×</button>
                </div>
                <p class="text-sm mt-1">Patient: <span id="modalPatientName" class="font-bold text-blue-600"></span></p>
            </div>

            <div class="p-6 space-y-4 max-h-[75vh] overflow-y-auto">
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 mb-2 uppercase tracking-wider">Select Procedure</label>
                    <select id="actionType" onchange="toggleActionFields()" class="w-full border border-slate-200 p-3 rounded-xl bg-white focus:ring-2 focus:ring-blue-500 outline-none font-medium">
                        <option value="complete">✅ Complete Consultation</option>
                        <option value="transfer">🔄 Refer / Carry Forward</option>
                        <option value="reschedule">📅 Reschedule Appointment</option>
                    </select>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase tracking-wider">Clinical Notes / Findings</label>
                    <textarea id="patientCondition" rows="3" placeholder="Enter diagnosis or reason for referral..." class="w-full border border-slate-200 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm"></textarea>
                </div>

                <div id="transferField" class="hidden space-y-2 p-4 bg-orange-50 rounded-xl border border-orange-100">
                    <label class="block text-[10px] font-bold text-orange-700 uppercase tracking-wider">Target Employee ID</label>
                    <input id="targetDocId" type="text" placeholder="Enter Employee ID" class="w-full border-orange-200 border p-3 rounded-lg outline-none text-sm">
                </div>

                <div id="rescheduleField" class="hidden grid grid-cols-2 gap-3 p-4 bg-blue-50 rounded-xl border border-blue-100">
                    <div>
                        <label class="block text-[10px] font-bold text-blue-700 uppercase tracking-wider">New Date</label>
                        <input id="newDate" type="date" class="w-full border-blue-200 border p-2 rounded-lg text-sm">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-blue-700 uppercase tracking-wider">New Time</label>
                        <input id="newTime" type="time" class="w-full border-blue-200 border p-2 rounded-lg text-sm">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3 pt-4 border-t border-slate-100">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase tracking-wider">Patient OTP</label>
                        <input id="otp" type="text" placeholder="OTP" class="w-full border border-slate-200 p-3 rounded-xl text-center font-bold tracking-widest outline-none">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase tracking-wider">Auth PIN (ID)</label>
                        <input id="docId" type="password" placeholder="Verify ID" class="w-full border border-slate-200 p-3 rounded-xl text-center outline-none">
                    </div>
                </div>
            </div>

            <div class="bg-slate-50 p-4 flex gap-3">
                <button onclick="closeModal()" class="flex-1 px-4 py-3 text-slate-500 font-bold text-sm uppercase">Cancel</button>
                <button id="confirmBtn" onclick="processClinicalAction()" class="flex-1 bg-blue-600 text-white px-4 py-3 rounded-xl font-bold shadow-lg hover:bg-blue-700 transition-all text-sm uppercase">Process Action</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBAnvpgtFnBRXYApmnnb4yoYQqHqcgnhsk", 
            authDomain: "clinical-570e7.firebaseapp.com",
            projectId: "clinical-570e7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const authUser = JSON.parse(localStorage.getItem("hdamc_auth"));
        if(!authUser) window.location.href="login.html";

        // Logic: Admin gets "Administrator", others get "Dr. Name"
        const displayName = authUser.role === "admin" ? `SYSTEM ADMINISTRATOR || ${authUser.name}` : `MEDICAL STAFF || Dr. ${authUser.name}`;
        document.getElementById("userDisplay").innerText = displayName;

        let activeCase = null;
        const listContainer = document.getElementById("list");

        const q = query(collection(db, "appointments"), orderBy("date", "desc"));
        onSnapshot(q, (snap) => {
            listContainer.innerHTML = "";
            let pendingCount = 0;

            snap.forEach(docSnap => {
                const data = docSnap.data();
                const serviceType = (data.service || "").toLowerCase();
                
                let isAuthorized = false;
                if(authUser.role === "admin") isAuthorized = true;
                else if(authUser.role === "dental" && serviceType.includes("dental")) isAuthorized = true;
                else if(authUser.role === "medical" && serviceType.includes("medical")) isAuthorized = true;
                if(data.assignedTo === authUser.empId) isAuthorized = true;

                if(!isAuthorized) return;

                const isDone = data.status === "completed";
                const isTransferred = data.status === "transferred";
                if(!isDone) pendingCount++;

                const card = document.createElement("div");
                card.className = `glass-card p-6 rounded-2xl flex flex-col justify-between ${isDone ? 'opacity-50 grayscale' : ''}`;

                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start mb-4">
                            <span class="status-badge ${isDone ? 'bg-green-100 text-green-700' : (isTransferred ? 'bg-orange-100 text-orange-700' : 'bg-amber-100 text-amber-700')}">
                                ${data.status || 'In Queue'}
                            </span>
                            <span class="text-[9px] text-slate-400 font-mono">ID: ${docSnap.id.slice(-6)}</span>
                        </div>
                        <h3 class="text-xl font-bold text-slate-800 mb-1">${data.name || data.patientName}</h3>
                        <p class="text-blue-600 text-[10px] font-bold uppercase tracking-widest mb-4">${data.service}</p>
                        
                        <div class="space-y-2 text-sm text-slate-500 mb-4">
                            <div class="flex items-center gap-2"><span>📅</span><span>${data.date} • ${data.time}</span></div>
                        </div>
                        
                        ${data.notes ? `<div class="p-3 bg-slate-50 rounded-lg text-xs text-slate-600 border-l-4 border-slate-300 mb-2 italic">"${data.notes}"</div>` : ''}
                        ${data.clinicalNotes ? `<div class="p-3 bg-blue-50 rounded-lg text-[11px] text-blue-800 border-l-4 border-blue-400 font-medium">Record: ${data.clinicalNotes}</div>` : ''}
                        ${data.assignedTo ? `<div class="mt-2 text-[10px] text-orange-600 font-bold uppercase">Assigned To ID: ${data.assignedTo}</div>` : ''}
                    </div>

                    <div class="mt-6 pt-4 border-t border-slate-100 flex items-center justify-between">
                        ${isDone 
                            ? `<span class="text-[10px] font-bold text-slate-400 uppercase">Consulted by: ${data.doctorName}</span>` 
                            : (authUser.role === "admin" 
                                ? `<span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">System Record View</span>` 
                                : `<button onclick="openModal('${docSnap.id}', '${data.bookingId}', '${data.name}')" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold text-sm hover:shadow-lg transition-all">Action</button>`
                              )
                        }
                        
                        ${authUser.role === "admin" ? `
                            <button onclick="confirmDelete('${docSnap.id}')" class="ml-4 p-2 text-slate-300 hover:text-red-500 transition-colors">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                            </button>
                        ` : ''}
                    </div>
                `;
                listContainer.appendChild(card);
            });

            document.getElementById("queueCounter").innerText = `${pendingCount} Clinical Cases`;
        });

        window.openModal = (id, otp, name) => {
            activeCase = { id, otp, name };
            document.getElementById("modal").classList.remove("hidden");
            document.getElementById("modalPatientName").innerText = name;
            toggleActionFields();
        };

        window.closeModal = () => {
            document.getElementById("modal").classList.add("hidden");
            ["otp", "docId", "patientCondition", "targetDocId", "newDate", "newTime"].forEach(id => {
                const el = document.getElementById(id); if(el) el.value = "";
            });
        };

        window.toggleActionFields = () => {
            const action = document.getElementById("actionType").value;
            document.getElementById("transferField").classList.toggle("hidden", action !== "transfer");
            document.getElementById("rescheduleField").classList.toggle("hidden", action !== "reschedule");
        };

        window.processClinicalAction = async () => {
            const action = document.getElementById("actionType").value;
            const note = document.getElementById("patientCondition").value;
            const enteredOtp = document.getElementById("otp").value;
            const enteredId = document.getElementById("docId").value;
            const btn = document.getElementById("confirmBtn");

            if(!note.trim()) return alert("⚠️ Notes are mandatory.");
            if(enteredOtp !== activeCase.otp) return alert("❌ OTP Failed.");
            if(enteredId !== authUser.empId) return alert("❌ PIN Failed.");

            try {
                btn.innerText = "Processing...";
                btn.disabled = true;
                const docRef = doc(db, "appointments", activeCase.id);
                let updateData = { clinicalNotes: note, lastUpdatedBy: authUser.name, updatedAt: new Date().toISOString() };

                if (action === "complete") {
                    updateData.status = "completed";
                    updateData.doctorName = authUser.name;
                    updateData.doctorId = authUser.empId;
                } else if (action === "transfer") {
                    const targetId = document.getElementById("targetDocId").value;
                    if(!targetId.trim()) throw new Error("ID required.");
                    updateData.status = "transferred";
                    updateData.assignedTo = targetId.trim();
                } else if (action === "reschedule") {
                    const nDate = document.getElementById("newDate").value;
                    const nTime = document.getElementById("newTime").value;
                    if(!nDate || !nTime) throw new Error("Select time.");
                    updateData.date = nDate; updateData.time = nTime; updateData.status = "rescheduled";
                }

                await updateDoc(docRef, updateData);
                closeModal();
            } catch (err) {
                alert(err.message);
            } finally {
                btn.innerText = "Process Action"; btn.disabled = false;
            }
        };

        window.confirmDelete = (id) => {
            if(confirm("Permanently delete record?")) deleteDoc(doc(db, "appointments", id));
        };
    </script>
</body>
</html>
