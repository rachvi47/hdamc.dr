<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HDAMC | Clinical Transfer & History Audit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; color: #1e293b; }
        .glass-card { background: white; border: 1px solid #e2e8f0; transition: all 0.2s ease; }
        .history-card { background: #f8fafc; border-left: 4px solid #cbd5e1; opacity: 0.85; }
        .active-card { border-left: 4px solid #3b82f6; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .status-badge { padding: 4px 10px; border-radius: 6px; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; }
        .clinical-thread { border-left: 2px dashed #3b82f6; padding-left: 10px; margin-top: 10px; }
    </style>
</head>
<body class="antialiased">

    <header class="sticky top-0 z-10 bg-white/90 backdrop-blur-md border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold text-slate-900 tracking-tight">Clinical Portal</h1>
                <p class="text-[10px] text-blue-600 uppercase font-extrabold tracking-widest" id="userDisplay">Authenticating...</p>
            </div>
            <button onclick="location.href='dashboard.html'" class="bg-slate-900 text-white px-5 py-2 rounded-lg text-sm font-bold shadow-lg">← Dashboard</button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-6">
        <div class="mb-8 flex justify-between items-end">
            <div>
                <h2 id="queueCounter" class="text-3xl font-black text-slate-800 tracking-tighter">...</h2>
                <p class="text-slate-500 font-medium italic text-sm">Reviewing both Active Queue and Handover History</p>
            </div>
        </div>

        <div id="list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="h-64 bg-slate-200 animate-pulse rounded-2xl"></div>
        </div>
    </main>

    <div id="modal" class="fixed inset-0 bg-slate-900/60 hidden backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden border border-slate-200">
            <div class="p-6 border-b border-slate-100 bg-slate-50">
                <div class="flex justify-between items-center">
                    <h2 class="text-lg font-bold text-slate-800">Consultation Action</h2>
                    <button onclick="closeModal()" class="text-slate-400 hover:text-red-500 text-2xl leading-none">×</button>
                </div>
                <p class="text-xs mt-1 text-blue-600 font-bold">Patient: <span id="modalPatientName"></span> | <span id="modalPatientID"></span></p>
            </div>

            <div class="p-6 space-y-5 max-h-[70vh] overflow-y-auto">
                <div id="previousNotesContainer" class="hidden p-4 bg-blue-50 border border-blue-100 rounded-xl">
                    <p class="text-[10px] font-bold text-blue-700 uppercase mb-2 italic">Previous Doctor's Findings:</p>
                    <div id="prevNotesText" class="text-xs text-blue-900 leading-relaxed whitespace-pre-line"></div>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-slate-400 mb-2 uppercase tracking-widest">Update Clinical Status</label>
                    <select id="actionType" onchange="toggleActionFields()" class="w-full border-2 border-slate-100 p-3 rounded-xl bg-white focus:border-blue-500 outline-none font-semibold text-sm">
                        <option value="complete">✅ Finalize & Close Case</option>
                        <option value="transfer">🔄 Carry Forward to Colleague</option>
                    </select>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase tracking-widest">New Clinical Entry</label>
                    <textarea id="patientCondition" rows="3" placeholder="Append treatment details..." class="w-full border-2 border-slate-100 p-3 rounded-xl focus:border-blue-500 outline-none text-sm"></textarea>
                </div>

                <div id="transferField" class="hidden p-4 bg-orange-50 rounded-xl border border-orange-100">
                    <label class="block text-[10px] font-bold text-orange-700 uppercase">Target Doctor Emp ID</label>
                    <input id="targetDocId" type="text" placeholder="EMP ID" class="w-full border-orange-200 border p-3 rounded-lg outline-none text-sm font-bold">
                </div>

                <div class="grid grid-cols-2 gap-4 pt-4 border-t border-slate-100">
                    <input id="otp" type="text" placeholder="Patient OTP" class="border-2 border-slate-100 p-3 rounded-xl text-center font-bold outline-none text-sm">
                    <input id="docId" type="password" placeholder="Doctor ID/PIN" class="border-2 border-slate-100 p-3 rounded-xl text-center outline-none text-sm">
                </div>
            </div>

            <div class="bg-slate-50 p-4 flex gap-3">
                <button onclick="closeModal()" class="flex-1 px-4 py-3 text-slate-500 font-bold text-xs uppercase">Dismiss</button>
                <button id="confirmBtn" onclick="processClinicalAction()" class="flex-1 bg-blue-600 text-white px-4 py-3 rounded-xl font-bold shadow-lg hover:bg-blue-700 text-xs uppercase">Process Case</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, query, orderBy, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBAnvpgtFnBRXYApmnnb4yoYQqHqcgnhsk", 
            authDomain: "clinical-570e7.firebaseapp.com",
            projectId: "clinical-570e7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const authUser = JSON.parse(localStorage.getItem("hdamc_auth"));
        if(!authUser) window.location.href="login.html";

        const isAdmin = authUser.role === "admin";
        document.getElementById("userDisplay").innerText = isAdmin ? `ADMIN: ${authUser.name}` : `DR. ${authUser.name} (${authUser.role.toUpperCase()})`;

        let activeCase = null;
        const listContainer = document.getElementById("list");

        // Unique Patient ID Generator (D0001 / M0001)
        async function assignPatientId(docId, service) {
            const prefix = service.toLowerCase().includes('dental') ? 'D' : 'M';
            const counterRef = doc(db, "counters", prefix);
            try {
                await runTransaction(db, async (transaction) => {
                    const counterSnap = await transaction.get(counterRef);
                    let newCount = 1;
                    if (counterSnap.exists()) newCount = counterSnap.data().count + 1;
                    transaction.set(counterRef, { count: newCount });
                    transaction.update(doc(db, "appointments", docId), { patientSerialId: `${prefix}${String(newCount).padStart(4, '0')}` });
                });
            } catch (e) { console.error(e); }
        }

        onSnapshot(query(collection(db, "appointments"), orderBy("date", "desc")), (snap) => {
            listContainer.innerHTML = "";
            let pendingCount = 0;

            snap.forEach(docSnap => {
                const data = docSnap.data();
                const serviceType = (data.service || "").toLowerCase();
                
                // Visibility Rules:
                // 1. Admin sees everything.
                // 2. Doctor sees if in their dept OR if they were the "TransferredBy" doctor (their history).
                // 3. Doctor sees if they are the current "AssignedTo" person.
                let isAuthorized = isAdmin || 
                    (data.assignedTo === authUser.empId) || 
                    (data.transferredBy === authUser.empId) ||
                    ( (!data.assignedTo) && (authUser.role === "dental" && serviceType.includes("dental")) ) ||
                    ( (!data.assignedTo) && (authUser.role === "medical" && serviceType.includes("medical")) );

                if(!isAuthorized) return;

                // Edit Logic: Only the person currently assigned can click the button.
                let canEdit = (data.assignedTo === authUser.empId) || (!data.assignedTo && !isAdmin && !isDone);
                if (data.status === "completed") canEdit = false;

                const isDone = data.status === "completed";
                const wasHandedByMe = data.transferredBy === authUser.empId;
                if(!isDone) pendingCount++;

                if(!data.patientSerialId && !isDone) assignPatientId(docSnap.id, data.service);

                const card = document.createElement("div");
                card.className = `glass-card p-5 rounded-2xl flex flex-col justify-between ${canEdit ? 'active-card' : 'history-card'}`;

                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start mb-4">
                            <span class="status-badge ${isDone ? 'bg-green-100 text-green-700' : (wasHandedByMe ? 'bg-slate-100 text-slate-500' : 'bg-blue-100 text-blue-700')}">
                                ${isDone ? 'Completed' : (wasHandedByMe ? 'Handed Over' : 'Active Queue')}
                            </span>
                            <span class="text-[10px] font-black text-slate-800 bg-white border px-2 py-1 rounded shadow-sm">${data.patientSerialId || 'PENDING'}</span>
                        </div>

                        <div class="mb-4">
                            <h3 class="text-lg font-bold text-slate-800">${data.name || data.patientName}</h3>
                            <p class="text-[10px] text-slate-500 font-bold uppercase">${data.gender || 'N/A'} • Age: ${data.age || 'N/A'} • ${data.phone || 'No Contact'}</p>
                        </div>

                        <div class="space-y-3">
                            <p class="text-[9px] font-bold text-slate-400 uppercase">Doctor Note History</p>
                            <div class="clinical-thread text-[11px] text-slate-600 italic">
                                ${data.clinicalNotes ? data.clinicalNotes : 'Awaiting consultation...'}
                            </div>
                        </div>
                    </div>

                    <div class="mt-6 pt-4 border-t border-slate-100">
                        ${isAdmin ? 
                            `<div class="flex justify-between items-center"><span class="text-[10px] font-bold text-slate-400">ADMIN VIEW</span><button onclick="confirmDelete('${docSnap.id}')" class="text-red-300 text-xs hover:text-red-500">Remove</button></div>` : 
                            (canEdit ? 
                                `<button onclick="openModal('${docSnap.id}', '${data.bookingId}', '${data.name}', '${data.patientSerialId}', '${data.clinicalNotes || ''}')" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold text-xs hover:bg-blue-700 shadow-lg shadow-blue-100 transition-all">OPEN CLINICAL CASE</button>` : 
                                `<p class="text-center text-[10px] font-bold text-slate-400 py-3 bg-slate-200/50 rounded-xl uppercase tracking-widest">Locked (History Record)</p>`
                            )
                        }
                    </div>
                `;
                listContainer.appendChild(card);
            });
            document.getElementById("queueCounter").innerText = `${pendingCount} Cases Total`;
        });

        window.openModal = (id, otp, name, serialId, prevNotes) => {
            activeCase = { id, otp, name, serialId, prevNotes };
            document.getElementById("modal").classList.remove("hidden");
            document.getElementById("modalPatientName").innerText = name;
            document.getElementById("modalPatientID").innerText = serialId;
            const prevContainer = document.getElementById("previousNotesContainer");
            if(prevNotes) {
                prevContainer.classList.remove("hidden");
                document.getElementById("prevNotesText").innerText = prevNotes;
            } else { prevContainer.classList.add("hidden"); }
        };

        window.closeModal = () => {
            document.getElementById("modal").classList.add("hidden");
            ["otp", "docId", "patientCondition", "targetDocId"].forEach(id => document.getElementById(id).value = "");
        };

        window.toggleActionFields = () => {
            document.getElementById("transferField").classList.toggle("hidden", document.getElementById("actionType").value !== "transfer");
        };

        window.processClinicalAction = async () => {
            const action = document.getElementById("actionType").value;
            const newNote = document.getElementById("patientCondition").value;
            const enteredOtp = document.getElementById("otp").value;
            const enteredId = document.getElementById("docId").value;
            const btn = document.getElementById("confirmBtn");

            if(!newNote.trim()) return alert("⚠️ Please enter treatment notes.");
            if(enteredOtp !== activeCase.otp) return alert("❌ OTP Mismatch.");
            if(enteredId !== authUser.empId) return alert("❌ Employee PIN Error.");

            try {
                btn.innerText = "Saving Clinical Data...";
                btn.disabled = true;
                const timestamp = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                const formattedEntry = `[${timestamp} | Dr. ${authUser.name}]: ${newNote}`;
                const fullClinicalRecord = activeCase.prevNotes ? `${activeCase.prevNotes}\n${formattedEntry}` : formattedEntry;

                let updateData = { clinicalNotes: fullClinicalRecord, lastUpdatedBy: authUser.name, updatedAt: new Date().toISOString() };

                if (action === "complete") {
                    updateData.status = "completed";
                    updateData.doctorName = authUser.name;
                    updateData.doctorId = authUser.empId;
                    updateData.assignedTo = null;
                } else if (action === "transfer") {
                    const targetId = document.getElementById("targetDocId").value;
                    if(!targetId.trim()) throw new Error("Target Doctor ID Required.");
                    updateData.status = "transferred";
                    updateData.assignedTo = targetId.trim();
                    updateData.transferredBy = authUser.empId;
                }
                await updateDoc(doc(db, "appointments", activeCase.id), updateData);
                closeModal();
            } catch (err) { alert(err.message); } 
            finally { btn.innerText = "Process Case"; btn.disabled = false; }
        };

        window.confirmDelete = (id) => { if(confirm("Permanently delete?")) deleteDoc(doc(db, "appointments", id)); };
    </script>
</body>
</html>
