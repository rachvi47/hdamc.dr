<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HDAMC | Clinical Portal Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f1f5f9;
            background-image: 
                linear-gradient(rgba(37, 99, 235, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(37, 99, 235, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
            perspective: 1000px;
        }

        .auth-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            padding: 40px;
            border-top: 6px solid #2563eb;
        }

        .input-group input {
            transition: all 0.2s ease;
            border: 1.5px solid #e2e8f0;
        }

        .input-group input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
            outline: none;
        }

        .lockout-timer {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Medical pulse loading icon */
        .loader {
            width: 18px;
            height: 18px;
            border: 2px solid #ffffff;
            border-bottom-color: transparent;
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="text-center mb-6">
        <h2 class="text-2xl font-bold text-slate-800">HDAMC</h2>
        <p class="text-slate-500 font-medium italic">Medical & Dental Care Portal</p>
    </div>

    <div class="auth-card">
        <div class="mb-8">
            <h1 class="text-xl font-bold text-slate-800">Practitioner & admin Login</h1>
            <p class="text-sm text-slate-400">Secure access for clinical staff only</p>
        </div>

        <form id="secureLoginForm" class="space-y-4">
            <div class="input-group">
                <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">Employee ID</label>
                <input type="text" id="empId" class="w-full mt-1 px-4 py-3 rounded-lg bg-slate-50 text-slate-900 font-medium" placeholder="Ex: MED-9980" required>
            </div>

            <div class="input-group">
                <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">Staff Name</label>
                <input type="text" id="staffName" class="w-full mt-1 px-4 py-3 rounded-lg bg-slate-100 text-slate-500 cursor-not-allowed" placeholder="Awaiting ID..." readonly>
            </div>

            <div class="input-group">
                <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">Security Password</label>
                <input type="password" id="password" class="w-full mt-1 px-4 py-3 rounded-lg bg-slate-50" placeholder="••••••••" required>
            </div>

            <div id="lockoutPanel" class="hidden bg-red-50 border border-red-200 p-3 rounded-lg text-center">
                <p class="text-red-600 text-xs font-bold uppercase tracking-tighter mb-1">Security Lock Active</p>
                <p class="text-red-500 text-sm">Please wait <span id="timerCountdown" class="font-bold text-lg">30</span>s</p>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-lg transition-all duration-200 flex justify-center items-center gap-3">
                <span id="btnLoader" class="loader hidden"></span>
                <span id="btnText">Authentication</span>
            </button>
        </form>

        <div class="mt-6 text-center">
            <p class="text-xs text-slate-400">© 2026 HDAMC Healthcare Systems. <br>Unauthorized access is strictly prohibited.</p>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {  
  apiKey: "AIzaSyBAnvpgtFnBRXYApmnnb4yoYQqHqcgnhsk",  
  authDomain: "clinical-570e7.firebaseapp.com",  
  projectId: "clinical-570e7",  
  storageBucket: "clinical-570e7.firebasestorage.app",  
  messagingSenderId: "521811871855",  
  appId: "1:521811871855:web:02ec35c3fd299db6e2659a",  
  measurementId: "G-DBRPR7MXT4"  
};  
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const empIdEl = document.getElementById("empId");
    const staffNameEl = document.getElementById("staffName");
    const loginForm = document.getElementById("secureLoginForm");
    const submitBtn = document.getElementById("submitBtn");
    const btnLoader = document.getElementById("btnLoader");
    const btnText = document.getElementById("btnText");
    const lockoutPanel = document.getElementById("lockoutPanel");
    const timerCountdown = document.getElementById("timerCountdown");

    let attemptCount = 0;

    // --- AUTO-FETCH PRACTITIONER NAME ---
    empIdEl.addEventListener("blur", async () => {
        const id = empIdEl.value.trim();
        if (!id) return;

        try {
            const userSnap = await getDoc(doc(db, "users", id));
            if (userSnap.exists()) {
                staffNameEl.value = userSnap.data().name;
                staffNameEl.classList.replace('text-slate-500', 'text-blue-600');
            } else {
                staffNameEl.value = "Unregistered ID";
                staffNameEl.classList.add('text-red-400');
            }
        } catch (err) { console.error("Network Error", err); }
    });

    // --- LOCKOUT HANDLER ---
    function triggerLockout() {
        submitBtn.disabled = true;
        lockoutPanel.classList.remove('hidden');
        let seconds = 30;
        
        const countdown = setInterval(() => {
            seconds--;
            timerCountdown.innerText = seconds;
            if (seconds <= 0) {
                clearInterval(countdown);
                submitBtn.disabled = false;
                lockoutPanel.classList.add('hidden');
                attemptCount = 0;
            }
        }, 1000);
    }

    // --- SECURE LOGIN EXECUTION ---
    loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        
        const empId = empIdEl.value.trim();
        const password = document.getElementById("password").value;

        // Loading State
        btnLoader.classList.remove('hidden');
        btnText.innerText = "Verifying Credentials...";
        submitBtn.disabled = true;

        try {
            const userRef = doc(db, "users", empId);
            const snap = await getDoc(userRef);

            if (!snap.exists()) throw new Error("ID not found in registry.");

            const data = snap.data();

            // 1. Password Verification
            if (data.password !== password) {
                attemptCount++;
                if (attemptCount >= 3) {
                    triggerLockout();
                    throw new Error("Security Alert: Excessive failed attempts.");
                }
                throw new Error(`Incorrect Password. ${3 - attemptCount} attempts remaining.`);
            }

            // 2. Single Device Enforcement (Session ID)
            const uniqueSessionId = `SESS_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;
            
            await updateDoc(userRef, {
                activeSession: uniqueSessionId,
                lastLogin: new Date().toLocaleString()
            });

            // 3. Store in LocalStorage
            localStorage.setItem("hdamc_auth", JSON.stringify({
                empId: empId,
                sessionToken: uniqueSessionId,
                role: data.role,
                name: data.name
            }));

            // Redirect
            window.location.href = "dashboard.html";

        } catch (err) {
            alert(err.message);
            btnLoader.classList.add('hidden');
            btnText.innerText = "Verify & Enter";
            if (attemptCount < 3) submitBtn.disabled = false;
        }
    });
</script>
</body>
</html>
